[audioinputs]
micInput = alsa_input.usb-BEHRINGER_UMC202HD_192k-00.pro-input-0

[audiooutputs]
mainOutput = alsa_output.pci-0000_13_00.6.analog-stereo

[keymap]
PLAY = KEY_PLAYPAUSE
PREV = KEY_PREVIOUSSONG
NEXT = KEY_NEXTSONG
STOP = KEY_STOPCD
RECORD = KEY_RECORD
PARAM1_SLIDER = volume/mainOutput
PARAM1_MUTE = mute/mainOutput
; PARAM2_SLIDER = volume/headsetOutput/150
PARAM2_MUTE = mute/micInput
; PARAM3_SOLO = exec/echo "Key {NK_KEY_ID}, value {NK_KEY_VALUE}"
